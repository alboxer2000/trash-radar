<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrashRadar</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const map = L.map('map').setView([0, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function loadGeoJson() {
            try {
                const response = await fetch('trash.geojson');
                
                if (!response.ok) return;

                const data = await response.json();

                const geoJsonLayer = L.geoJSON(data, {
                    
                    pointToLayer: function (feature, latlng) {
                        const color = feature.properties['marker-color'] || '#3b82f6';
                        return L.circleMarker(latlng, {
                            radius: 8,
                            fillColor: color,
                            color: "#ffffff", 
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    },
                    
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.description) {
                            layer.bindPopup(feature.properties.description);
                        } else if (feature.properties && feature.properties.Object) {
                            
                            layer.bindPopup("<strong>" + feature.properties.Object + "</strong>");
                        }
                    }
                }).addTo(map);

                const bounds = geoJsonLayer.getBounds();
                if (bounds.isValid()) {
                    map.fitBounds(bounds, { padding: [50, 50] });
                }

            } catch (error) {
                console.error('failed to load geojson', error);
            }
        }

        window.onload = loadGeoJson;
    </script>
</body>
</html>
